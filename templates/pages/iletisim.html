{% extends "base.html" %}
{% block title %}İletişim{% endblock %}
{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header"><h3>Bizimle İletişime Geçin</h3></div>
                <div class="card-body">
                    <p>Her türlü soru, öneri ve iş birliği teklifleriniz için aşağıdaki formu doldurabilirsiniz.</p>
                    <form method="post">
                        {% csrf_token %}
                        {{ form.as_p }}
                        <div class="d-grid"><button type="submit" class="btn btn-info">Mesajı Gönder</button></div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
