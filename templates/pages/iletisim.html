{% extends "base.html" %}
{% block title %}İletişim{% endblock %}
{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm border-0">
                <div class="card-body p-4">
                    <h3 class="text-center mb-4">Bizimle İletişime Geçin</h3>
                    <p class="text-center text-muted mb-4">Her türlü soru, öneri ve iş birliği teklifleriniz için aşağıdaki formu doldurabilirsiniz.</p>
                    <form method="post">
                        {% csrf_token %}
                        {% include 'partials/_form.html' with form=form %}
                        <div class="d-grid mt-4">
                            <button type="submit" class="btn btn-info text-white">Mesajı Gönder</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
