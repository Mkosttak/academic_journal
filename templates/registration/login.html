{% extends "base.html" %}

{% block title %}Giriş Yap{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">
                    <h3>Giriş Yap</h3>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        {% include 'partials/_form.html' with form=form %}
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary">Giriş Yap</button>
                        </div>
                    </form>
                    <hr>
                    <p class="text-center">Hesabınız yok mu? <a href="{% url 'kayit_ol' %}">Kayıt Olun</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
